<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字冒险游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'LocalMono';
            src: local('SF Mono'), local('Monaco'), local('Consolas'), local('Liberation Mono'), local('Courier New');
        }

        body {
            font-family: 'LocalMono', 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #00ff88;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 200, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            text-align: center;
            margin-bottom: 40px;
        }

        .title h1 {
            font-size: 2.5rem;
            text-shadow: 
                0 0 10px rgba(0, 255, 136, 0.5),
                0 0 20px rgba(0, 255, 136, 0.3),
                0 0 40px rgba(0, 255, 136, 0.2);
            letter-spacing: 4px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(0, 255, 136, 0.5), 0 0 20px rgba(0, 255, 136, 0.3); }
            to { text-shadow: 0 0 15px rgba(0, 255, 136, 0.8), 0 0 30px rgba(0, 255, 136, 0.5); }
        }

        .subtitle {
            color: #00ccff;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        .input-section {
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 20px rgba(0, 255, 136, 0.1),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .input-section label {
            display: block;
            margin-bottom: 15px;
            font-size: 1rem;
            color: #00ff88;
        }

        .input-section textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 10, 5, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 4px;
            color: #00ff88;
            font-family: inherit;
            font-size: 1rem;
            padding: 15px;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-section textarea:focus {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .input-section textarea::placeholder {
            color: rgba(0, 255, 136, 0.4);
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            margin-top: 20px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2) 0%, rgba(0, 200, 100, 0.2) 100%);
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.4) 0%, rgba(0, 200, 100, 0.4) 100%);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.2) 0%, rgba(0, 100, 200, 0.2) 100%);
            border-color: #00ccff;
            color: #00ccff;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.4) 0%, rgba(0, 100, 200, 0.4) 100%);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.4);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .novel-result {
            margin-top: 30px;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 10, 5, 0.8);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .novel-result h1, .novel-result h2 {
            color: #00ff88;
            margin: 20px 0 10px 0;
        }

        .novel-result h1 {
            font-size: 1.8rem;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .novel-result h2 {
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            padding-bottom: 5px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
        }

        .game-content {
            display: flex;
            gap: 20px;
        }

        .game-main {
            flex: 1;
        }

        .log-box {
            width: 280px;
            min-width: 280px;
            background: rgba(0, 10, 5, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 4px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .chapter-display {
            font-size: 1.2rem;
            color: #00ccff;
        }

        .chapter-display span {
            color: #00ff88;
            font-weight: bold;
        }

        .end-game-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.3) 0%, rgba(200, 50, 50, 0.3) 100%);
            border: 1px solid #ff6464;
            color: #ff6464;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .end-game-btn:hover {
            background: linear-gradient(135deg, rgba(255, 100, 100, 0.5) 0%, rgba(200, 50, 50, 0.5) 100%);
            box-shadow: 0 0 15px rgba(255, 100, 100, 0.4);
        }

        .end-game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .scene-box {
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 150px;
            line-height: 1.8;
            font-size: 1.1rem;
            position: relative;
        }

        .scene-box::before {
            content: '>';
            position: absolute;
            left: 15px;
            top: 30px;
            color: #00ff88;
            opacity: 0.6;
        }

        .scene-text {
            padding-left: 20px;
        }

        .loading {
            display: none;
            align-items: center;
            gap: 5px;
        }

        .loading.active {
            display: flex;
        }

        .cursor {
            width: 10px;
            height: 20px;
            background: #00ff88;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .custom-choice-container {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .custom-choice-input {
            flex: 1;
            padding: 15px;
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 200, 255, 0.4);
            border-radius: 4px;
            color: #00ff88;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .custom-choice-input:focus {
            border-color: #00ccff;
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
        }

        .custom-choice-input::placeholder {
            color: rgba(0, 255, 136, 0.4);
        }

        .custom-choice-btn {
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2) 0%, rgba(0, 200, 100, 0.2) 100%);
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .custom-choice-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.4) 0%, rgba(0, 200, 100, 0.4) 100%);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .custom-choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ending-select-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .ending-select-box {
            background: rgba(0, 20, 10, 0.95);
            border: 2px solid rgba(0, 255, 136, 0.5);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
        }

        .ending-select-title {
            font-size: 1.3rem;
            color: #00ff88;
            margin-bottom: 20px;
        }

        .ending-select-box select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 10, 5, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 4px;
            color: #00ff88;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .ending-select-box select option {
            background: rgba(0, 20, 10, 0.95);
            color: #00ff88;
        }

        .ending-confirm-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2) 0%, rgba(0, 200, 100, 0.2) 100%);
            border: 1px solid #00ff88;
            color: #00ff88;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-right: 10px;
        }

        .ending-confirm-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.4) 0%, rgba(0, 200, 100, 0.4) 100%);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .ending-cancel-btn {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: rgba(0, 255, 136, 0.6);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .ending-cancel-btn:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .choice-btn {
            padding: 18px 25px;
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: #00ff88;
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .choice-btn:hover {
            background: rgba(0, 255, 136, 0.15);
            border-color: #00ff88;
            padding-left: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .choice-btn:hover::before {
            transform: scaleY(1);
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .log-title {
            color: #00ccff;
            font-size: 0.9rem;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .ending-select-container {
            font-size: 0.85rem;
            color: rgba(0, 255, 136, 0.7);
            padding: 8px 0;
            padding-left: 15px;
            position: relative;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            line-height: 1.5;
        }

        .log-entry::before {
            content: '';
            position: absolute;
            left: 0;
            color: #00ff88;
        }

        .log-chapter-num {
            color: #00ccff;
            font-weight: bold;
            margin-right: 5px;
        }

        .ending-box {
            text-align: center;
            padding: 40px;
        }

        .ending-type {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding: 15px 30px;
            border-radius: 8px;
            display: inline-block;
        }

        .ending-type.good {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
        }

        .ending-type.neutral {
            background: rgba(0, 200, 255, 0.2);
            border: 2px solid #00ccff;
            color: #00ccff;
        }

        .ending-type.bad {
            background: rgba(255, 100, 100, 0.2);
            border: 2px solid #ff6464;
            color: #ff6464;
        }

        .ending-scene {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .error-message {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid #ff6464;
            color: #ff6464;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 10, 5, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }

        .progress-container {
            background: rgba(0, 20, 10, 0.8);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-title {
            color: #00ff88;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .progress-percent {
            color: #00ccff;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 20, 10, 0.8);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88 0%, #00ccff 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-status {
            color: rgba(0, 255, 136, 0.8);
            font-size: 0.9rem;
        }

        .progress-time {
            color: rgba(0, 200, 255, 0.8);
            font-size: 0.9rem;
        }

        .characters-btn {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .characters-btn:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.5);
        }

        .character-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: rgba(10, 10, 20, 0.98);
            border-left: 1px solid rgba(0, 255, 136, 0.2);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .character-panel.open {
            right: 0;
        }

        .character-panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .character-panel-header h3 {
            color: #00ff88;
            font-size: 1.2rem;
        }

        .character-panel-close {
            background: none;
            border: none;
            color: #00ff88;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .character-panel-tabs {
            display: flex;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .character-panel-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: rgba(0, 255, 136, 0.5);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .character-panel-tab.active {
            color: #00ff88;
            border-bottom: 2px solid #00ff88;
        }

        .character-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .character-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .character-card-mini {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .character-card-mini:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.4);
        }

        .character-card-mini-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .character-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #00ff88;
        }

        .character-info h4 {
            color: #00ff88;
            margin: 0;
            font-size: 1rem;
        }

        .character-info .title {
            color: rgba(0, 200, 255, 0.8);
            font-size: 0.8rem;
            margin: 2px 0 0 0;
        }

        .character-status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
        }

        .character-status.active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .character-status.inactive {
            background: rgba(136, 136, 136, 0.2);
            color: #888;
        }

        .character-status.deceased {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .character-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .character-detail-modal.open {
            display: flex;
        }

        .character-detail-content {
            background: rgba(10, 10, 20, 0.98);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .character-detail-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .character-detail-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .character-detail-info h2 {
            color: #00ff88;
            margin: 0;
        }

        .character-detail-info .title {
            color: rgba(0, 200, 255, 0.8);
            margin: 5px 0 0 0;
        }

        .character-detail-body {
            padding: 20px;
        }

        .character-section {
            margin-bottom: 20px;
        }

        .character-section h4 {
            color: rgba(0, 200, 255, 0.8);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .character-section p {
            color: rgba(0, 255, 136, 0.8);
            line-height: 1.6;
        }

        .attribute-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .attribute-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .attribute-label {
            width: 60px;
            color: rgba(0, 255, 136, 0.6);
            font-size: 0.85rem;
        }

<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <div class="title">
                <h1>文字冒险</h1>
                <p class="subtitle">选择你的命运，书写你的传奇</p>
            </div>
            <div class="input-section">
                <label for="world-setting">设定你的世界观</label>
                <textarea id="world-setting" placeholder="例如：赛博朋克新加坡、古代江湖、深海科研站遭遇变异体、末日后的废土世界..."></textarea>
                <div class="button-group">
                    <button class="btn" onclick="startGame()">开始冒险</button>
                    <button class="btn btn-secondary" id="continue-btn" onclick="continueGame()" style="display: none;">继续游戏</button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="chapter-display">第 <span id="chapter-num">1</span> 章</div>
                <div class="loading" id="loading">
                    <div class="cursor"></div>
                    <span style="margin-left: 10px; color: rgba(0, 255, 136, 0.6);">生成中...</span>
                </div>
                <button class="characters-btn" onclick="toggleCharacterPanel()">👥 角色</button>
                <button class="end-game-btn" id="end-game-btn" onclick="triggerEnding()">结束游戏</button>
            </div>
            <div class="game-content">
                <div class="game-main">
                    <div class="scene-box">
                        <div class="scene-text" id="scene-text"></div>
                    </div>
                    <div class="choices-container" id="choices-container"></div>
                    <div class="custom-choice-container" id="custom-choice-container">
                        <input type="text" class="custom-choice-input" id="custom-choice-input" placeholder="输入自定义选项..." />
                        <button class="custom-choice-btn" id="custom-choice-btn" onclick="submitCustomChoice()">✓</button>
                    </div>
                </div>
                <div class="log-box">
                    <div class="log-title">冒险日志</div>
                    <div id="log-container"></div>
                </div>
            </div>
        </div>

        <div id="ending-screen" class="screen">
            <div class="title">
                <h1>冒险终章</h1>
            </div>
            <div class="ending-box">
                <div class="ending-type" id="ending-type"></div>
                <div class="scene-box ending-scene" id="ending-scene"></div>
                <div class="button-group">
                    <button class="btn" id="generate-novel-btn" onclick="generateNovel()">生成小说</button>
                    <button class="btn btn-secondary" onclick="resetGame()">重新开始</button>
                </div>
                <div class="loading" id="novel-loading">
                    <div class="cursor"></div>
                    <span style="margin-left: 10px; color: rgba(0, 200, 255, 0.6);">小说生成中，请稍候...</span>
                </div>
                <div class="novel-result" id="novel-result"></div>
            </div>
        </div>

        <div class="ending-select-container" id="ending-select-container" style="display: none;">
            <div class="ending-select-box">
                <div class="ending-select-title">选择结局类型</div>
                <select id="ending-type-select">
                    <option value="好结局">好结局</option>
                    <option value="坏结局">坏结局</option>
                </select>
                <button class="ending-confirm-btn" onclick="confirmEnding()">确认</button>
                <button class="ending-cancel-btn" onclick="cancelEnding()">取消</button>
            </div>
        </div>

        <div class="character-panel" id="character-panel">
            <div class="character-panel-header">
                <h3>角色管理</h3>
                <button class="character-panel-close" onclick="toggleCharacterPanel()">×</button>
            </div>
            <div class="character-panel-tabs">
                <button class="character-panel-tab active" onclick="switchCharacterTab('list')">角色列表</button>
                <button class="character-panel-tab" onclick="switchCharacterTab('graph')">关系图</button>
            </div>
            <div class="character-panel-content">
                <div id="character-list-tab">
                    <div class="character-list" id="character-list"></div>
                    <button class="add-character-btn" onclick="showCharacterForm()">+ 添加角色</button>
                </div>
                <div id="character-graph-tab" style="display: none;">
                    <div class="graph-container">
                        <canvas id="graph-canvas" class="graph-canvas"></canvas>
                        <div class="graph-legend" id="graph-legend"></div>
                    </div>
                    <button class="add-character-btn" onclick="showRelationForm()">+ 添加关系</button>
                </div>
            </div>
        </div>

        <div class="character-detail-modal" id="character-detail-modal">
            <div class="character-detail-content">
                <div class="character-detail-header">
                    <div class="character-detail-avatar" id="detail-avatar">👤</div>
                    <div class="character-detail-info">
                        <h2 id="detail-name"></h2>
                        <p class="title" id="detail-title"></p>
                    </div>
                </div>
                <div class="character-detail-body">
                    <div class="character-section">
                        <h4>描述</h4>
                        <p id="detail-description"></p>
                    </div>
                    <div class="character-section">
                        <h4>性格</h4>
                        <p id="detail-personality"></p>
                    </div>
                    <div class="character-section">
                        <h4>属性</h4>
                        <div class="attribute-bars" id="detail-attributes"></div>
                    </div>
                    <div class="character-section">
                        <h4>技能</h4>
                        <div class="skills-list" id="detail-skills"></div>
                    </div>
                    <div class="character-section">
                        <h4>关系</h4>
                        <div id="detail-relations"></div>
                    </div>
                </div>
                <div class="character-detail-actions">
                    <button class="btn btn-secondary" onclick="closeCharacterDetail()">关闭</button>
                    <button class="btn" onclick="editCharacter()">编辑</button>
                </div>
            </div>
        </div>

        <div class="character-form-modal" id="character-form-modal">
            <div class="character-form-content">
                <h3 id="form-title">添加角色</h3>
                <form id="character-form" onsubmit="saveCharacter(event)">
                    <input type="hidden" id="form-char-id">
                    <div class="form-group">
                        <label>角色名称 *</label>
                        <input type="text" id="form-name" required>
                    </div>
                    <div class="form-group">
                        <label>称号/职业</label>
                        <input type="text" id="form-title-input">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea id="form-description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>性格</label>
                        <input type="text" id="form-personality">
                    </div>
                    <div class="form-group">
                        <label>背景故事</label>
                        <textarea id="form-background"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>生命值</label>
                            <input type="number" id="form-health" value="100" min="0" max="200">
                        </div>
                        <div class="form-group">
                            <label>魔力值</label>
                            <input type="number" id="form-mana" value="100" min="0" max="200">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>力量</label>
                            <input type="number" id="form-strength" value="10" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label>智力</label>
                            <input type="number" id="form-intelligence" value="10" min="1" max="100">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>魅力</label>
                            <input type="number" id="form-charisma" value="10" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select id="form-status">
                                <option value="active">活跃</option>
                                <option value="inactive">非活跃</option>
                                <option value="deceased">已故</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeCharacterForm()">取消</button>
                        <button type="submit" class="btn">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="character-form-modal" id="relation-form-modal">
            <div class="character-form-content">
                <h3>添加角色关系</h3>
                <form id="relation-form" onsubmit="saveRelation(event)">
                    <div class="form-group">
                        <label>源角色</label>
                        <select id="relation-source" required></select>
                    </div>
                    <div class="form-group">
                        <label>目标角色</label>
                        <select id="relation-target" required></select>
                    </div>
                    <div class="form-group">
                        <label>关系类型</label>
                        <select id="relation-type"></select>
                    </div>
                    <div class="form-group">
                        <label>关系强度 (0-100)</label>
                        <input type="number" id="relation-strength" value="50" min="0" max="100">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="relation-description">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeRelationForm()">取消</button>
                        <button type="submit" class="btn">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'adventure_game_save';
        
        let messages = [];
        let chapter = 0;
        let logs = [];
        let currentScene = null;
        let currentChoices = null;
        let endingTriggered = false;
        let endingCountdown = 0;
        let worldSetting = "";
        let selectedEndingType = "";
        let customChoiceInput = null;

        function saveGameState() {
            try {
                const gameState = {
                    messages: messages,
                    chapter: chapter,
                    logs: logs,
                    currentScene: currentScene,
                    currentChoices: currentChoices,
                    endingTriggered: endingTriggered,
                    endingCountdown: endingCountdown,
                    worldSetting: worldSetting,
                    selectedEndingType: selectedEndingType,
                    timestamp: Date.now()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
                console.log('游戏状态已保存');
            } catch (e) {
                console.error('保存游戏状态失败:', e);
                if (e.name === 'QuotaExceededError') {
                    console.error('存储空间不足，无法保存游戏状态');
                }
            }
        }

        function loadGameState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const gameState = JSON.parse(saved);
                    const hoursSinceSave = (Date.now() - gameState.timestamp) / (1000 * 60 * 60);
                    
                    if (hoursSinceSave > 24) {
                        console.log('存档已超过24小时，清除旧存档');
                        clearGameState();
                        return null;
                    }
                    
                    return gameState;
                }
            } catch (e) {
                console.error('加载游戏状态失败:', e);
                clearGameState();
            }
            return null;
        }

        function clearGameState() {
            try {
                localStorage.removeItem(STORAGE_KEY);
                console.log('游戏状态已清除');
            } catch (e) {
                console.error('清除游戏状态失败:', e);
            }
        }

        function restoreGameState(gameState) {
            if (!gameState) return;
            
            messages = gameState.messages || [];
            chapter = gameState.chapter || 0;
            logs = gameState.logs || [];
            currentScene = gameState.currentScene;
            currentChoices = gameState.currentChoices;
            endingTriggered = gameState.endingTriggered || false;
            endingCountdown = gameState.endingCountdown || 0;
            worldSetting = gameState.worldSetting || "";
            selectedEndingType = gameState.selectedEndingType || "";

            document.getElementById('chapter-num').textContent = chapter;
            
            const logContainer = document.getElementById('log-container');
            logContainer.innerHTML = '';
            logs.forEach(log => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                if (log.log) {
                    const chapterNum = logs.indexOf(log) + 1;
                    entry.innerHTML = `<span class="log-chapter-num">【第${chapterNum}轮】</span> ${log.log}`;
                } else {
                    entry.textContent = log;
                }
                logContainer.appendChild(entry);
            });
            logContainer.scrollTop = logContainer.scrollHeight;

            if (currentScene) {
                document.getElementById('scene-text').textContent = currentScene;
            }

            if (currentChoices && currentChoices.length > 0) {
                const choicesContainer = document.getElementById('choices-container');
                choicesContainer.innerHTML = '';
                currentChoices.forEach((choice, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = `${index + 1}. ${choice}`;
                    btn.onclick = () => makeChoice(choice);
                    choicesContainer.appendChild(btn);
                });
            }

            if (endingTriggered) {
                document.getElementById('end-game-btn').disabled = true;
                document.getElementById('end-game-btn').textContent = '收尾中...';
                document.getElementById('custom-choice-container').style.display = 'none';
            }

            console.log('游戏状态已恢复');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showError(title, message) {
            const sceneText = document.getElementById('scene-text');
            const resultContainer = document.getElementById('novel-result');
            
            const errorHtml = `
                <div class="error-message" style="text-align: left;">
                    <div style="font-weight: bold; margin-bottom: 10px;">${title}</div>
                    <div style="font-size: 0.9rem; opacity: 0.9;">${message}</div>
                </div>
            `;
            
            if (sceneText && document.getElementById('game-screen').classList.contains('active')) {
                sceneText.innerHTML = errorHtml;
            } else if (resultContainer) {
                resultContainer.innerHTML = errorHtml;
            }
        }

        function setLoading(isLoading) {
            const loading = document.getElementById('loading');
            const choices = document.querySelectorAll('.choice-btn');
            
            if (isLoading) {
                loading.classList.add('active');
                choices.forEach(btn => btn.disabled = true);
            } else {
                loading.classList.remove('active');
                choices.forEach(btn => btn.disabled = false);
            }
        }

        function updateLog(logText) {
            logs.push(logText);
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = logText;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function addChapterLog(scene, choices, selectedChoice, log) {
            const chapterLog = {
                scene: scene,
                choices: choices,
                selectedChoice: selectedChoice,
                log: log
            };
            logs.push(chapterLog);
            
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = log;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        async function startGame() {
            worldSetting = document.getElementById('world-setting').value.trim();
            if (!worldSetting) {
                showError('请输入世界观描述', '请在文本框中输入你想要探索的世界观设定，例如：赛博朋克新加坡、古代江湖等。');
                return;
            }

            messages = [];
            chapter = 1;
            logs = [];
            currentScene = null;
            currentChoices = null;
            endingTriggered = false;
            endingCountdown = 0;
            document.getElementById('chapter-num').textContent = chapter;
            document.getElementById('log-container').innerHTML = '';
            document.getElementById('custom-choice-container').style.display = 'flex';

            try {
                await fetch('/api/save-memory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ worldSetting: worldSetting })
                });
            } catch (e) {
                console.error('保存世界观失败:', e);
                showError('保存世界观失败', '无法连接到服务器，请检查网络连接后重试。');
                return;
            }

            messages.push({
                role: 'user',
                content: `开始游戏。世界观设定：${worldSetting}`
            });

            saveGameState();
            showScreen('game-screen');
            await sendMessage();
        }

        async function makeChoice(choice) {
            if (logs.length > 0) {
                logs[logs.length - 1].selectedChoice = choice;
            }
            
            if (logs.length > 0) {
                fetch('/api/update-memory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scene: logs[logs.length - 1].scene,
                        selectedChoice: choice,
                        logSummary: logs[logs.length - 1].log,
                        endingType: ''
                    })
                }).catch(e => console.error('更新memory失败:', e));
            }
            
            chapter++;
            document.getElementById('chapter-num').textContent = chapter;
            
            messages.push({
                role: 'user',
                content: choice
            });

            saveGameState();
            await sendMessage();
        }

        function triggerEnding() {
            if (endingTriggered) return;
            endingTriggered = true;
            endingCountdown = 3;
            document.getElementById('end-game-btn').disabled = true;
            document.getElementById('end-game-btn').textContent = '收尾中...';
        }

        async function sendMessage() {
            setLoading(true);
            document.getElementById('scene-text').innerHTML = '';
            document.getElementById('choices-container').innerHTML = '';

            let extraPrompt = '';
            if (endingTriggered && endingCountdown > 0) {
                endingCountdown--;
                if (endingCountdown === 0) {
                    extraPrompt = `（系统提示：请生成${selectedEndingType}，必须返回ending字段，ending字段值必须与用户选择的结局类型一致）`;
                } else {
                    extraPrompt = `（系统提示：请在${endingCountdown + 1}轮内收尾并生成${selectedEndingType}）`;
                }
            }

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        messages: messages,
                        extraPrompt: extraPrompt,
                        endingType: selectedEndingType
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                const content = data.content;
                if (!content) {
                    throw new Error('API返回内容为空');
                }
                
                messages.push({
                    role: 'assistant',
                    content: content
                });

                let parsed;
                try {
                    let jsonStr = content;
                    const braceStart = jsonStr.indexOf('{');
                    const braceEnd = jsonStr.lastIndexOf('}');
                    if (braceStart !== -1 && braceEnd !== -1 && braceEnd > braceStart) {
                        jsonStr = jsonStr.substring(braceStart, braceEnd + 1);
                    }
                    
                    const sceneMatch = jsonStr.match(/"scene"\s*:\s*"((?:[^"\\]|\\.)*)"/s);
                    const logMatch = jsonStr.match(/"log"\s*:\s*"((?:[^"\\]|\\.)*)"/s);
                    const endingMatch = jsonStr.match(/"ending"\s*:\s*"((?:[^"\\]|\\.)*)"/s);
                    const choicesMatch = jsonStr.match(/"choices"\s*:\s*\[((?:[^\[\]\\]|\\.)*)\]/s);
                    
                    parsed = {};
                    
                    if (sceneMatch) {
                        parsed.scene = sceneMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                    }
                    
                    if (logMatch) {
                        parsed.log = logMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                    }
                    
                    if (endingMatch) {
                        parsed.ending = endingMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                    }
                    
                    if (choicesMatch) {
                        const choicesStr = choicesMatch[1];
                        const choices = [];
                        let current = '';
                        let inQuote = false;
                        let escape = false;
                        for (let i = 0; i < choicesStr.length; i++) {
                            const char = choicesStr[i];
                            if (escape) {
                                current += char;
                                escape = false;
                            } else if (char === '\\') {
                                current += char;
                                escape = true;
                            } else if (char === '"') {
                                inQuote = !inQuote;
                                current += char;
                            } else if (char === ',' && !inQuote) {
                                if (current.trim()) {
                                    choices.push(current.trim());
                                }
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        if (current.trim()) {
                            choices.push(current.trim());
                        }
                        parsed.choices = choices.map(c => {
                            return c.replace(/^["']|["']$/g, '').replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                        });
                    }
                    
                    if (!parsed.scene && !parsed.log && !parsed.ending && !parsed.choices) {
                        throw new Error('无法解析任何有效字段');
                    }
                } catch (e) {
                    console.error('JSON解析错误:', e);
                    console.error('原始内容:', content.substring(0, 500));
                    throw new Error('AI返回格式错误: ' + e.message);
                }

                renderScene(parsed);

            } catch (error) {
                let errorMessage = error.message;
                let errorDetail = '';
                
                if (errorMessage.includes('504')) {
                    errorDetail = '服务器响应超时，请稍后重试。如果问题持续，请检查网络连接。';
                } else if (errorMessage.includes('502') || errorMessage.includes('网络请求错误')) {
                    errorDetail = '网络连接失败，请检查您的网络设置后重试。';
                } else if (errorMessage.includes('API请求失败')) {
                    errorDetail = 'AI服务暂时不可用，请稍后重试。';
                } else if (errorMessage.includes('AI返回格式错误')) {
                    errorDetail = 'AI返回的数据格式不正确，系统已自动重试。如果问题持续，请联系开发者。';
                } else if (errorMessage.includes('无法解析任何有效字段')) {
                    errorDetail = 'AI返回的内容不完整，请重试。';
                } else {
                    errorDetail = '发生了未知错误，请刷新页面重试。如果问题持续，请联系开发者。';
                }
                
                showError('发生错误', errorDetail);
                setLoading(false);
            }
        }

        async function generateNovel() {
            const loading = document.getElementById('novel-loading');
            const resultContainer = document.getElementById('novel-result');
            const generateBtn = document.getElementById('generate-novel-btn');

            loading.classList.add('active');
            resultContainer.innerHTML = '';
            generateBtn.disabled = true;

            const progressContainer = document.createElement('div');
            progressContainer.className = 'progress-container';
            progressContainer.innerHTML = `
                <div class="progress-header">
                    <span class="progress-title">小说生成中...</span>
                    <span class="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
                <div class="progress-info">
                    <span class="progress-status">正在初始化...</span>
                    <span class="progress-time">预计剩余时间: --</span>
                </div>
            `;
            resultContainer.appendChild(progressContainer);

            const progressFill = progressContainer.querySelector('.progress-fill');
            const progressPercent = progressContainer.querySelector('.progress-percent');
            const progressStatus = progressContainer.querySelector('.progress-status');
            const progressTime = progressContainer.querySelector('.progress-time');

            const startTime = Date.now();
            const estimatedTime = 180000;
            
            const progressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                let progress = Math.min((elapsed / estimatedTime) * 100, 95);
                
                if (progress < 20) {
                    progressStatus.textContent = '正在分析游戏记忆...';
                } else if (progress < 40) {
                    progressStatus.textContent = '正在规划小说结构...';
                } else if (progress < 60) {
                    progressStatus.textContent = '正在生成章节内容...';
                } else if (progress < 80) {
                    progressStatus.textContent = '正在完善细节描写...';
                } else if (progress < 95) {
                    progressStatus.textContent = '正在润色和校对...';
                }
                
                const remaining = Math.max(estimatedTime - elapsed, 0);
                const remainingSeconds = Math.ceil(remaining / 1000);
                const minutes = Math.floor(remainingSeconds / 60);
                const seconds = remainingSeconds % 60;
                progressTime.textContent = `预计剩余时间: ${minutes}分${seconds}秒`;
                
                progressFill.style.width = `${progress}%`;
                progressPercent.textContent = `${Math.round(progress)}%`;
            }, 500);

            try {
                const response = await fetch('/api/generate-novel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressPercent.textContent = '100%';
                progressStatus.textContent = '生成完成！';
                progressTime.textContent = '预计剩余时间: 0秒';

                setTimeout(() => {
                    if (data.novel_content) {
                        resultContainer.innerHTML = `
                            <div class="novel-content">
                                <h3>小说已生成</h3>
                                <p>保存路径: ${data.novel_path}</p>
                                <div class="novel-text">${data.novel_content.replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    } else {
                        resultContainer.innerHTML = '小说生成成功';
                    }
                    generateBtn.style.display = 'none';
                }, 500);

            } catch (error) {
                clearInterval(progressInterval);
                
                let errorDetail = '';
                if (error.message.includes('504')) {
                    errorDetail = '小说生成超时，请稍后重试。如果问题持续，请尝试减少故事长度。';
                } else if (error.message.includes('502') || error.message.includes('网络请求错误')) {
                    errorDetail = '网络连接失败，请检查您的网络设置后重试。';
                } else if (error.message.includes('API请求失败')) {
                    errorDetail = 'AI服务暂时不可用，请稍后重试。';
                } else if (error.message.includes('memory.md不存在')) {
                    errorDetail = '游戏记忆文档不存在，请先开始一局游戏。';
                } else {
                    errorDetail = '生成失败: ' + error.message + '。请刷新页面重试。';
                }
                
                showError('小说生成失败', errorDetail);
                generateBtn.disabled = false;
            } finally {
                loading.classList.remove('active');
            }
        }

            const sourceSelect = document.getElementById('relation-source');
            const targetSelect = document.getElementById('relation-target');
            const typeSelect = document.getElementById('relation-type');
            
            const options = charactersData.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            sourceSelect.innerHTML = options;
            targetSelect.innerHTML = options;
            
            const typeOptions = Object.entries(relationTypes).map(([key, val]) => 
                `<option value="${key}">${val.icon} ${val.name}</option>`
            ).join('');
            typeSelect.innerHTML = typeOptions;
            
            document.getElementById('relation-form').reset();
            document.getElementById('relation-form-modal').classList.add('open');
        }

        function closeRelationForm() {
            document.getElementById('relation-form-modal').classList.remove('open');
        }

        async function saveRelation(event) {
            event.preventDefault();
            
            const relation = {
                source_id: document.getElementById('relation-source').value,
                target_id: document.getElementById('relation-target').value,
                relation_type: document.getElementById('relation-type').value,
                strength: parseInt(document.getElementById('relation-strength').value) || 50,
                description: document.getElementById('relation-description').value
            };
            
            if (relation.source_id === relation.target_id) {
                showError('错误', '源角色和目标角色不能相同');
                return;
            }
            
            try {
                const response = await fetch('/api/relations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(relation)
                });
                const data = await response.json();
                if (data.success) {
                    closeRelationForm();
                    await loadCharactersList();
                    renderRelationshipGraph();
                } else {
                    showError('保存失败', data.error || '未知错误');
                }
            } catch (e) {
                showError('保存失败', '网络错误: ' + e.message);
            }
        }

        function renderGraphLegend() {
            const container = document.getElementById('graph-legend');
            container.innerHTML = Object.entries(relationTypes).slice(0, 6).map(([key, val]) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${val.color}"></div>
                    <span>${val.name}</span>
                </div>
            `).join('');
        }

        async function renderRelationshipGraph() {
            try {
                const response = await fetch('/api/characters/graph');
                const data = await response.json();
                const { nodes, edges } = data;
                
                const canvas = document.getElementById('graph-canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                
                if (nodes.length === 0) {
                    ctx.fillStyle = 'rgba(0, 255, 136, 0.5)';
                    ctx.font = '14px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('暂无角色数据', canvas.width / 2, canvas.height / 2);
                    return;
                }
                
                const graphNodes = nodes.map((n, i) => ({
                    ...n,
                    x: canvas.width / 2 + Math.cos(2 * Math.PI * i / nodes.length) * 120,
                    y: canvas.height / 2 + Math.sin(2 * Math.PI * i / nodes.length) * 120,
                    vx: 0,
                    vy: 0
                }));
                
                const iterations = 100;
                const repulsion = 3000;
                const attraction = 0.005;
                const damping = 0.85;
                
                for (let iter = 0; iter < iterations; iter++) {
                    for (let j = 0; j < graphNodes.length; j++) {
                        for (let k = j + 1; k < graphNodes.length; k++) {
                            const dx = graphNodes[k].x - graphNodes[j].x;
                            const dy = graphNodes[k].y - graphNodes[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            const force = repulsion / (dist * dist);
                            graphNodes[j].vx -= dx / dist * force;
                            graphNodes[j].vy -= dy / dist * force;
                            graphNodes[k].vx += dx / dist * force;
                            graphNodes[k].vy += dy / dist * force;
                        }
                    }
                    
                    for (const edge of edges) {
                        const source = graphNodes.find(n => n.id === edge.source);
                        const target = graphNodes.find(n => n.id === edge.target);
                        if (source && target) {
                            const dx = target.x - source.x;
                            const dy = target.y - source.y;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            const force = dist * attraction;
                            source.vx += dx * force;
                            source.vy += dy * force;
                            target.vx -= dx * force;
                            target.vy -= dy * force;
                        }
                    }
                    
                    for (const node of graphNodes) {
                        node.vx *= damping;
                        node.vy *= damping;
                        node.x += node.vx;
                        node.y += node.vy;
                        node.x = Math.max(40, Math.min(canvas.width - 40, node.x));
                        node.y = Math.max(40, Math.min(canvas.height - 40, node.y));
                    }
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                for (const edge of edges) {
                    const source = graphNodes.find(n => n.id === edge.source);
                    const target = graphNodes.find(n => n.id === edge.target);
                    if (source && target) {
                        ctx.beginPath();
                        ctx.moveTo(source.x, source.y);
                        ctx.lineTo(target.x, target.y);
                        ctx.strokeStyle = edge.color || '#00ff88';
                        ctx.lineWidth = Math.max(1, edge.strength / 30);
                        ctx.stroke();
                        
                        const angle = Math.atan2(target.y - source.y, target.x - source.x);
                        const arrowLen = 10;
                        const arrowX = target.x - Math.cos(angle) * 25;
                        const arrowY = target.y - Math.sin(angle) * 25;
                        ctx.beginPath();
                        ctx.moveTo(arrowX, arrowY);
                        ctx.lineTo(arrowX - arrowLen * Math.cos(angle - 0.5), arrowY - arrowLen * Math.sin(angle - 0.5));
                        ctx.lineTo(arrowX - arrowLen * Math.cos(angle + 0.5), arrowY - arrowLen * Math.sin(angle + 0.5));
                        ctx.closePath();
                        ctx.fillStyle = edge.color || '#00ff88';
                        ctx.fill();
                    }
                }
                
                for (const node of graphNodes) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 20, 0, Math.PI * 2);
                    ctx.fillStyle = node.status === 'active' ? 'rgba(0, 255, 136, 0.3)' : 
                                   node.status === 'deceased' ? 'rgba(255, 68, 68, 0.3)' : 'rgba(136, 136, 136, 0.3)';
                    ctx.fill();
                    ctx.strokeStyle = node.status === 'active' ? '#00ff88' : 
                                     node.status === 'deceased' ? '#ff4444' : '#888888';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.fillStyle = '#00ff88';
                    ctx.font = '12px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(node.name.substring(0, 4), node.x, node.y + 35);
                }
                
            } catch (e) {
                console.error('渲染关系图失败:', e);
            }
        }
    </script>
</body>
